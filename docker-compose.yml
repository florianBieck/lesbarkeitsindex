services:
  r-sidecar:
    build:
      context: .
      dockerfile: Dockerfile.r-sidecar
    container_name: r-sidecar
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    ports:
      - "8787:8787"

  postgres:
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    container_name: postgres
    logging:
      options:
        max-size: 1g
    volumes:
      - postgres_db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=lesbarkeitsindex
    image: postgres:16

volumes:
  postgres_db: