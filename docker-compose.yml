services:
  r-sidecar:
    build:
      context: .
      dockerfile: Dockerfile.r-sidecar
    container_name: r-sidecar
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8787/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    ports:
      - '8787:8787'

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=lesbarkeitsindex
    volumes:
      - postgres_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d lesbarkeitsindex']
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: 1g

volumes:
  postgres_db:
